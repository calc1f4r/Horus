## Common Errors and Fixes

| Error | Cause | Fix |
|-------|-------|-----|
| `certoraMutate: command not found` | Old certora-cli | `pip install --upgrade certora-cli` |
| `No Gambit binary for platform` | Linux ARM / Windows | Build from source with `cargo build --release` |
| `0 mutants generated` | No matching constructs for operators | Choose operators matching code patterns in target file |
| `Package not found` | Remapping path wrong | Remove trailing `/` from remapping source/target |
| `orig_run status not Executed` | Baseline in bad state | Run fresh `certoraRun` baseline instead |
| `Mutant compile error` | Manual patch format invalid | Validate with `patch --dry-run`; ensure `.patch` extension |
| `Halted campaign` | Time limit exceeded | Reduce `num_mutants`; split files across multiple campaigns |
| `Problem â€” no report` | Prover submission failure | Check `CERTORAKEY`; check conf for syntax errors; re-run with `--debug` |
| `All rules pass but coverage 0%` | `rule_sanity: none` set | Set `rule_sanity: basic` and re-run baseline |
| `Vacuity warning after hardening` | New rule has contradictory requires | Rewrite rule; add `satisfy` statement; check with `rule_sanity: basic` |
| `applied_mutants_dir empty` | `--gambit_only` generation failed | Run `certoraMutate ... --gambit_only --debug` to see Gambit errors |

