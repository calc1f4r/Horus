## Gambit Mutation Operators

| Operator | Code Target | Invariant Categories |
|----------|-------------|----------------------|
| `binary-op-mutation` | `+`, `-`, `*`, `/`, `%`, `**`, bitwise ops | arithmetic, precision, conservation |
| `require-mutation` | `require(cond)` â†’ `require(!cond)` or `require(true)` | access control, guards, invariants |
| `assignment-mutation` | `x = expr` â†’ `x = 0` or alternate | accounting, state initialization |
| `if-cond-mutation` | `if (cond)` â†’ `if (true)` or `if (false)` | state machine, guard conditions |
| `if-statement-mutation` | replaces `if` body | state transitions, conditional effects |
| `delete-expression-mutation` | removes expression statement | state updates, storage writes |
| `swap-arguments-operator-mutation` | swaps operands `a op b` â†’ `b op a` | non-commutativity, ordering |
| `elim-delegate-mutation` | `delegatecall` â†’ `call` | proxy, upgrade, call semantics |
| `unary-operator-mutation` | inserts or removes `!`, `~`, `-` | boolean guards, sign invariants |

> **Disabled operators (do not use):** `function-call-mutation`, `swap-arguments-function-mutation` â€” these are inactive in current Gambit.

### Operator selection by invariant category

```
access control / guards      â†’ require-mutation, if-cond-mutation
arithmetic / precision       â†’ binary-op-mutation, assignment-mutation, unary-operator-mutation
state transitions            â†’ if-cond-mutation, if-statement-mutation, delete-expression-mutation
ordering / non-commutativity â†’ swap-arguments-operator-mutation
delegatecall / upgrade proxy â†’ elim-delegate-mutation
conservation of value        â†’ binary-op-mutation, assignment-mutation
```

---

## Workflow

### Phase 0: Input Validation

Read and validate all inputs before taking any action:

```
1. conf_path               â†’ does the file exist? does it have "verify", "files", "rule_sanity"?
2. invariant_suite_path    â†’ is it present? does it contain named invariant categories?
3. CERTORAKEY              â†’ is it set in the environment?
4. baseline status         â†’ is there a prior executed run URL? or must we run fresh?
```

If `invariant_suite_path` is missing, stop and request it or invoke `invariant-writer` before continuing. Operator selection without invariants produces generic, low-signal mutations.

If the conf file is missing `rule_sanity`, add it before proceeding.

### Phase 1: Environment Pre-flight

```bash
certoraRun --version
certoraMutate --help
solc --version
echo $CERTORAKEY
```

Check:
- `certoraMutate` is available (included in `certora-cli` since version 4.x; upgrade if missing)
- `CERTORAKEY` is exported
- `solc` version matches contract pragma
- Remapping paths exist and do NOT end with `/`

If `certoraMutate` is not found:
```bash
pip install --upgrade certora-cli
```

If on Linux ARM or Windows (no Gambit binary):
```bash
# Build Gambit from source (requires Rust + Cargo)
git clone https://github.com/Certora/gambit
cd gambit && cargo build --release
# Add ./target/release/gambit to PATH
```

### Phase 2: Baseline Gate

Never proceed to mutation without a passing baseline.

**Option A â€” Run baseline fresh:**
```bash
certoraRun path/to/conf.conf
```

**Option B â€” Reuse executed baseline:**
```bash
certoraMutate path/to/conf.conf --orig_run "https://prover.certora.com/output/<job>/<id>/?anonymousKey=<key>"
```

Rules for `--orig_run`:
- The referenced run must show dashboard status `Executed` (not `Halted`, `Problem`, `Timeout`)
- Files from that run are downloaded to `--orig_run_dir` (default: `.certora_internal`)
- If baseline rules or files changed since the original run, create a new baseline instead

If baseline fails: stop. Diagnose and fix the baseline spec before attempting mutations.

### Phase 3: Mutation Config Generation

Map invariant categories to operator sets. Prefer targeted, small campaigns for the first pass.

**Operator selection process:**
1. Read invariant suite â€” list all named categories
2. Map each category to operators using the table above
3. Per contract file: select the 2â€“4 most relevant operators
4. Start with `num_mutants: 8â€“12` per file; scale after signal quality is confirmed
5. Use `seed` for deterministic campaigns

**Recommended conf shape:**

```json
{
  "mutations": {
    "gambit": [
      {
        "filename": "src/Contract.sol",
        "num_mutants": 10,
        "mutations": ["binary-op-mutation", "require-mutation", "if-cond-mutation"],
        "seed": 42
      }
    ],
    "manual_mutants": [
      {
        "file_to_mutate": "src/Contract.sol",
        "mutants_location": "certora/mutations/manual"
      }
    ],
    "msg": "invariant-driven campaign â€” arithmetic and access control"
  }
}
```

Validate before submitting:
- All `filename` / `file_to_mutate` paths exist relative to the project root
- No path ends with `/`
- `msg` clearly describes campaign intent
- `num_mutants` is bounded (keep â‰¤20 per file for initial campaigns)

### Phase 4: Generation Sanity Check

Always run generation sanity after any config change:

```bash
certoraMutate path/to/conf.conf --gambit_only
```

This validates:
- Gambit can parse and compile all target files
- The selected operators produce valid mutant candidates
- Mutant count is reasonable

Inspect generated mutants:
```bash
ls .certora_internal/applied_mutants_dir
```

If generation produces 0 mutants for a file: check that the file contains the code constructs targeted by your operators.

### Phase 5: Campaign Execution

```bash
# Full mutation campaign
certoraMutate path/to/conf.conf

# With explicit message
certoraMutate path/to/conf.conf --msg "campaign-name-v1"

# Capture collection failures for debugging
certoraMutate path/to/conf.conf --dump_failed_collects failed_collects.log

# Verbose debug output
certoraMutate path/to/conf.conf --debug
```

Execution order:
1. `--gambit_only` (Phase 4 â€” always first after config changes)
2. Full run
3. `--debug` and `--dump_failed_collects` only when troubleshooting

Note: Submitting verification jobs may take several minutes. Full completion can require hours depending on mutant count and contract complexity.

Monitor progress at: `https://prover.certora.com/mutations`

### Phase 6: Results Interpretation

From the mutation report:

| Metric | Meaning |
|--------|---------|
| **Coverage** | caught mutants / total tested mutants â€” target â‰Ą80% |
| **Rules** | rules that caught â‰Ą1 mutant / all tested rules |
| **Solo Rules** | rules that uniquely caught â‰Ą1 mutant â€” high solo count = non-redundant spec |
| **Live mutants** | mutants that passed all spec rules â€” must be triaged |
| **Failed-invalid** | mutants that failed to compile or collect â€” count separately |

Dashboard statuses:
- `Running` â€” prover jobs still executing
- `Calculating` â€” jobs done, report aggregating
- `Executed` â€” full report available
- `Halted` â€” global time limit hit; partial report only
- `Problem` â€” errors occurred; report likely unavailable

### Phase 7: Live Mutant Triage

For every live mutant, apply this classification:

**Equivalent mutant**
- The mutation produces semantically identical behavior for all tested properties
- Common patterns: swapping `+0`, multiplying by `1`, `require(true)` that was already always true
- Action: document with a structured comment in the spec; exclude from hardening

**Setup / compile artifact**
- Collection or compilation failed for this mutant
- Check `--dump_failed_collects` output for details
- Action: fix env/config; rerun only this mutant class

**True spec gap**
- The mutated contract behaves differently in a reachable scenario, and the spec does not catch it
- This is the only class that warrants a spec change
- Action: identify the reachable path â†’ write minimal new rule or tighten existing invariant â†’ rerun

**Triage record format:**
```
Mutant ID:
Operator:
Modified file + line:
Status: live
Classification: equivalent | setup-artifact | true-spec-gap
Reachable Path: <which public function reaches the mutated line>
Evidence: <what the mutant does that differs>
Action: <document / fix env / spec patch>
```

### Phase 8: Hardening Loop

For each true spec gap:

1. Identify the minimal property the gap violates
2. Write the smallest viable CVL change (new rule or tighten existing invariant)
3. Re-run baseline (`certoraRun`) to confirm spec still compiles and passes
4. Re-run only the affected mutant subset:
   ```bash
   certoraMutate path/to/conf.conf --orig_run <prior_executed_run_url>
   ```
5. Compare before/after metrics â€” coverage must increase, no vacuity regressions

Reject any hardening that:
- Increases kills by adding contradictory requires
- Adds `satisfy` statements that pass through vacuous paths
- Filters methods most likely to violate the property

