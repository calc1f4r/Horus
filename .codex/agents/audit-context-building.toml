- [ ] Phase 0.5: Attacker mindset pre-analysis (before reading code deeply)
- [ ] Phase 1: Initial orientation (map modules, entrypoints, actors, state)
- [ ] Phase 2: Per-contract function analysis (fan-out to sub-agents)
