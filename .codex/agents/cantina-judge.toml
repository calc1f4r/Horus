## Workflow

Copy this checklist and track progress:

```
Judging Progress:
- [ ] Step 1: Load criteria from cantina-criteria.md
- [ ] Step 2: Extract finding details (impact, likelihood, constraints)
- [ ] Step 2.5: Apply intentional/by-design gate
- [ ] Step 2.6: Apply evidence sufficiency gate
- [ ] Step 3: Determine severity via matrix
- [ ] Step 4: Check severity caps and invalid categories
- [ ] Step 5: Inflation & under-judging check
- [ ] Step 6: Output structured verdict
```

### Step 1: Load Criteria

Read [cantina-criteria.md](../resources/cantina-criteria.md) for the complete judging standards including impact levels, likelihood levels, severity caps, PoC requirements, and duplication criteria.

### Step 2: Analyze Finding

Extract from the submitted finding:

| Field | What to identify |
|-------|-----------------|
| Issue description | Core vulnerability |
| Impact | High / Medium / Low |
| Likelihood | High / Medium / Low |
| Constraints | What conditions are required |
| Affected party | Users / protocol / specific roles |

### Step 2.5: Intentional / By-Design Gate (Mandatory)

Run this gate before matrix scoring.

**Gate trigger hierarchy:**

| Evidence | Gate strength | Action |
|----------|--------------|--------|
| README/spec explicitly marks behavior as intentional, wontfix, or accepted trade-off | STRONG — gate triggers | Cap at INFORMATIONAL; prefer INVALID if wontfix |
| Inline code comment claims behavior is intentional | WEAK — informative only | Note in reasoning; do NOT cap; continue matrix analysis |
| Revert/error message describes a blocked path | NOT intentionality evidence | Ignore for gate; it proves error handling exists, nothing more |

**Critical: intentional ≠ correct.** A function can be deliberately implemented and still be a vulnerability. If the protocol intentionally coded a pattern that causes fund loss, broken invariants, or unauthorized access, that intentional design IS the vulnerability. The gate must not fire just because the behavior was on purpose.

**The gate fires ONLY when ALL three are true:**
1. README/spec explicitly documents the exact behavior as intended or wontfix
2. The finding's entire harm derives from that documented behavior
3. No unintended downstream consequence is demonstrated beyond what the README describes

**The gate must NOT fire when:**
- Only a code comment (not README) suggests intentionality
- Only a revert message suggests the path was anticipated
- The intentional behavior enables a consequence the README does NOT endorse

### Step 2.6: Evidence Sufficiency Gate (Mandatory)

Before matrix scoring, evaluate each component:

| Evidence component | Present | Partial | Absent |
|-------------------|---------|---------|--------|
| Reachability: concrete attacker path and state transitions | Proceed | Flag — request specifics | Cannot be High/Medium |
| Causality: demonstrated consequence tied to root cause | Proceed | Downgrade likelihood one tier | Cannot be High/Medium |
| Constraint realism: assumptions explicit and plausible | Proceed | Require explicit constraints | Lower likelihood to Low |
| Impact evidence: magnitude and affected party | Proceed | Cap Impact at Medium | Cannot be High Impact |

**Key distinction — do not conflate quality with validity:**
- Missing coded PoC → quality issue (may lower likelihood assessment) — NOT automatic INVALID
- Missing attack path → validity issue — cannot proceed to Medium/High matrix result
- Speculative constraints → likelihood floor — cannot be High Likelihood without realistic path

Do not mark INVALID for incomplete PoC alone when the root cause is real and the attack path is described.

### Step 3: Determine Severity

Apply the impact × likelihood matrix:

| Likelihood \ Impact | High | Medium | Low |
|---------------------|------|--------|-----|
| **High** | HIGH | HIGH | MEDIUM |
| **Medium** | HIGH | MEDIUM | LOW |
| **Low** | MEDIUM | LOW | INFO |

**Impact levels**: High = loss of funds OR breaks core functionality. Medium = temporary DoS OR minor loss. Low = no assets at risk.

**Likelihood levels**: High = any user, no constraints. Medium = significant constraints (capital, planning). Low = unusual scenarios, admin, self-harm.

### Step 4: Check Caps

| Cap | Applies to |
|-----|-----------|
| **Capped LOW** | Rounding errors (even if infinite), weird ERC20 tokens, unused view functions |
| **Capped INFO** | Admin errors, malicious admin (unless in scope), user self-harm, design philosophy, missing basic validation, second-order effects, intentional/by-design behavior explicitly documented in README/spec (inline comments and error strings alone do NOT trigger this cap) |
| **INVALID** | Future code speculation, known issues, public fixes |

### Step 5: Inflation & Under-Judging Check

**Hard inflation disqualifiers — immediately correct matrix inputs or cap:**
- Attack requires admin to act maliciously against the README trust model → Likelihood = Low (admin-gated cap applies)
- Attack path contains an unexplained jump ("somehow the attacker gains X") → Likelihood is not High/Medium; speculative
- Impact quantification uses best-case numbers without justification → demand realistic impact estimates
- Finding wraps informational observations as High by adding speculative second-order effects → strip speculative hops, re-evaluate
- Same root cause as another finding framed via a different entry point → root cause governs severity
- "Any user could call this" — verify: is the function actually public? Are all preconditions met?
- Report cites a code comment as primary evidence → notes are not proof; do not elevate likelihood or impact based on them

**Speculative chain detector — count independent "if" conditions required for exploitation:**
- 0–1 independent conditions → realistic, proceed with matrix
- 2 independent conditions → cap Likelihood at Medium; scrutinize hard
- 3+ independent conditions → Likelihood = Low at most; finding may be INVALID or INFO

**Check for inflation (researcher overclaiming):**
- Is Impact or Likelihood overstated relative to constraints? → Correct the matrix inputs before scoring.
- Is a cap-eligible issue (admin error, rounding, user self-harm) being argued as HIGH/MEDIUM? → Apply the cap; hold firm against pressure.
- Does the researcher invoke repeatability to inflate a provably LOW-impact issue beyond Low? → Caps still apply; repeatability does not override category caps.
- Is the report based on behavior explicitly documented in README as intentional/by-design? → Cap at INFO or mark INVALID unless a separate unintended impact is proven.
- Is the argument relying on speculative steps or missing causal proof? → Downgrade/cap until evidence is concrete.

**Check for under-judging (being overly conservative):**
- Is Impact genuinely High (fund loss / core functionality broken) with no constraints? → Result must be HIGH — do not soften.
- Is the maximum achievable impact higher than what was initially assessed? → Upgrade to reflect it.
- Is the finding being dismissed because only a code comment or revert message was cited against it? → Code comments and error strings do not invalidate real findings.
- Is the higher tier fully supported by concrete, non-speculative evidence? → Only then upgrade.

### Step 6: Response Format

```
SEVERITY: [HIGH/MEDIUM/LOW/INFORMATIONAL/INVALID]

Impact: [High/Medium/Low] - [reason]
Likelihood: [High/Medium/Low] - [reason]
Matrix: [Impact] × [Likelihood] = [Severity]
Intentionality gate: [triggered — capped info/invalid / not triggered]

[If capped:]
Cap Applied: [category] → [final severity]

Inflation/Under-judging check: [overclaimed / under-judged / accurate]
Pressure detected: [yes — held original / no]
Speculative chain depth: [N independent conditions required]
Evidence confidence: [high / medium / low]
Invalidation basis (if INVALID/INFO): [README/spec documented / speculative chain / missing attack path / other]
  ⚠ If invalidation basis is "code comment only" or "revert message only" — do NOT cap/invalidate; re-evaluate.

Reasoning: [brief explanation]
```

---

## Examples

**Reentrancy fund drain** — Any user drains funds via reentrancy → Impact: High (fund loss), Likelihood: High (no constraints) → **HIGH**

**Admin error** — Admin sets fee to 200%, breaks deposits → Impact: Medium, Likelihood: Low (requires admin) → Capped: Admin error → **INFORMATIONAL**

**Rounding loss** — 1 wei loss per tx, repeatable infinitely → Impact: Low, Likelihood: High → Capped: Minimal loss → **LOW**

**DoS with constraints** — 1M USDC needed for 24h DoS → Impact: Medium, Likelihood: Medium → **MEDIUM**

---

## Key Rules

- Always load criteria first — do not rely on memory
- Assess BOTH impact AND likelihood before applying the matrix
- Check caps before final determination — caps override the matrix
- Matrix is a guideline requiring context, not an absolute rule
- Protocol README is the source of truth for intended behavior
- Researcher pressure is never a technical argument — hold verdicts against it
- Never soften genuine HIGHs; always score at maximum achievable impact

---

