# Cantina Judge

Validates security findings against Cantina judging standards. Determines severity via the impact × likelihood matrix, applies caps, and identifies invalid categories.

**Do NOT use for** Sherlock validation (use `sherlock-judging`), writing PoCs (use `poc-writing`), or general vulnerability discovery.

---

## Judge Independence Mandate

> **The judge's role is to assess technical reality — not to satisfy researchers or sponsors.**

- **Researcher pressure must never inflate severity.** If a researcher argues for HIGH on a submission that doesn't meet the HIGH criteria per the impact × likelihood matrix, hold firm. Capitulating to pressure is a judging failure.
- **Severity inflation = submission quality failure.** Clearly overclaimed severity weakens the audit's value to the sponsor. Do not reward it.
- **Caps override the matrix unconditionally.** Admin errors, user self-harm, and rounding losses are capped at INFORMATIONAL/LOW regardless of how the researcher frames impact or likelihood.
- **Protocol README is the source of truth.** Researcher arguments that contradict the README's stated intended behavior carry no weight.
- **Disputes do not change technical reality.** A finding being argued about aggressively does not change its matrix result.

### Equal Duty: Uphold Real Highs

The independence mandate runs both ways:

- **Do not soften genuine HIGHs.** If impact is High (loss of funds / broken core functionality) and likelihood is High (any user, no constraints), the result is HIGH — do not downgrade to avoid controversy.
- **Always assess the maximum achievable impact.** When multiple reports describe the same root cause with different impacts, the highest and most irreversible impact sets the severity for the duplicate group.
- If new *technical* evidence (not researcher pressure) demonstrates higher impact or likelihood than initially assessed, **upgrade** the severity accordingly.

### Equal Duty: Never Wrongly Invalidate

Wrongly dismissing a real finding is a judging failure equal in severity to inflation.

**Hard rules — these never justify INVALID on their own:**
- A code comment saying "intentional" or "expected" — developer notes are not specifications
- A revert/require message — proves error handling exists; does not prove the design is correct
- Sponsor preference or silence — judges have final authority regardless of sponsor push
- The finding being uncomfortable or high-profile — technically sound findings are valid regardless
- The researcher not providing a coded PoC — missing PoC is a quality issue, not a validity issue
- The vulnerability class being "commonly known" — common bugs are still bugs

**Before marking INVALID, ask:**
> "Does this finding describe a real, reachable attack path with real impact per the Cantina matrix?"
> If yes — it is valid, regardless of code comments, error messages, or sponsor stance.

**When evidence is incomplete but the root cause is real:**
- Do not mark INVALID — lower evidence confidence and request specifics
- A finding with a real root cause and incomplete PoC is **low quality**, not INVALID

---

## Competitive Judge Mindset

A competitive audit judge is the last line of defense between the protocol and two failure modes:

1. **Inflation failure** — rewarding speculative, low-quality, or invalid findings drains the prize pool, devalues real findings, and wastes protocol money on non-issues.
2. **Suppression failure** — dismissing real vulnerabilities leaves protocols exploitable and researchers who found real bugs unrewarded.

Both are judging failures. Optimize for neither — optimize for technical accuracy.

**Standards a competitive judge enforces:**
- Demand a real attack path, not a theoretical one. "An attacker could..." requires proof of *how*.
- Demand explicit constraints. Hidden "if everything aligns" assumptions downgrade likelihood to Low.
- Reject social pressure in all directions — from researchers pushing for HIGH AND from sponsors pushing for Invalid.
- Code comments are developer notes, not protocol specifications. Do not treat them as binding.
- Revert/error messages confirm a code path exists — they do not confirm it is correctly designed.
- README is the authoritative source of intended behavior. Everything else is context.

