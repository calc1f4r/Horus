# Report Aggregator

Assembles judge-verified audit findings into a final, publication-quality security report using **Sherlock submission format** with **verified code citations**.

**Prerequisite**: Judged findings — either from the audit pipeline (`audit-output/10-deep-review.md`, `audit-output/issues/`) or manually provided findings with severity, root cause, and affected code.

**Do NOT use for** finding vulnerabilities (use `invariant-catcher`), writing PoCs (use `poc-writing`), or judging findings (use `judge-orchestrator`).

---

## Inputs

The agent accepts findings from multiple sources:

### Pipeline Mode (spawned by audit-orchestrator)
Read these files from `audit-output/`:
1. `10-deep-review.md` — Judge verdicts (CONFIRMED/DEMOTED/REJECTED)
2. `08-pre-judge-results.md` — Pre-judge screening results
3. `05-findings-triaged.md` — Full finding details with root cause, impact, affected code
4. `issues/F-NNN-issue.md` — Polished individual findings from `issue-writer`
5. `pocs/F-NNN-poc.*` — PoC files (if generated)
6. `02-invariants-reviewed.md` — Invariant specifications
7. `00-scope.md` — Scope definition (files, LOC, protocol type)
8. `pipeline-state.md` — Pipeline execution record

### Standalone Mode (direct invocation)
Accepts a path to a directory or file containing findings. Each finding must have:
- Title
- Severity (HIGH/MEDIUM/LOW/CRITICAL)
- Root cause with code location
- Impact description
- Attack scenario

---

## Workflow

### Step 1: Collect and Filter Findings

1. Read all finding sources
2. Filter to **CONFIRMED** findings only (from deep review verdicts)
3. Include **DEMOTED** findings in Appendix A
4. Include **DISPUTED** findings in Appendix B (PoC passes but judges disagree)
5. Exclude **REJECTED** findings entirely

### Step 2: Resolve Severity Consensus

For each confirmed finding, apply the severity reconciliation rules:

**Full judge mode** (3 judges):
| Scenario | Rule |
|----------|------|
| All 3 agree | Use agreed severity |
| 2 agree, 1 differs | Use the 2-judge consensus |
| All 3 differ | Use LOWEST (conservative) |

**Single-judge mode**:
Use the judge's severity directly.

### Step 3: Verify All Code Citations

**CRITICAL STEP — this is the agent's core differentiator.**

For every finding, verify code citations against the actual codebase:

1. **Read the affected file** at the cited line range using `Read`
2. **Verify the code at those lines** matches what the finding describes
3. **Fix misaligned line numbers** — if the content has shifted, grep for the vulnerable pattern and update the line range
4. **Generate GitHub permalink** if a repo URL is available:
   ```
   [`file.sol:L42-L55`](https://github.com/org/repo/blob/<commit>/src/file.sol#L42-L55)
   ```
5. **For PoC/mitigation code** — include inline as plain code blocks (no GitHub links — these are agent-generated, not in-repo)

**Citation rules:**
- Existing codebase code → GitHub permalink format (if URL available) or `file:LNNN` format
- Agent-generated code (PoCs, fixes) → inline code blocks only, never fabricate URLs
- Every line number must be verified by reading the file — never trust cached line numbers

### Step 4: Assemble Report in Sherlock Format

Use the report structure defined in [audit-report-template.md](../resources/audit-report-template.md).

#### Per-Finding Format (Sherlock Submission Template)

```markdown
## [Title]

### Summary

[1-2 sentence summary: what's wrong, where, and the impact.]

### Root Cause

In [`file.sol:42`](https://github.com/org/repo/blob/<commit>/src/file.sol#L42), [description of the root cause].

### Internal Pre-conditions

1. [Actor] needs to [action] such that [condition is met]

### External Pre-conditions

1. [External entity] needs to [be in some state]

### Attack Path

1. [Attacker] calls [`function()`](https://github.com/org/repo/blob/<commit>/src/file.sol#L42) with [parameters]
2. This causes [state change] because [reason with code citation]
3. [Attacker] then calls [`withdraw()`](link) which [exploits the state]
4. Result: [concrete quantified impact]

### Impact

[Affected party] suffers [exact loss]. [Attacker gains X].

### PoC

[Inline code block — no GitHub links for PoC code]

### Mitigation

[Inline code block — no GitHub links for mitigation code]
```

### Step 5: Compute Report Statistics

Fill in the Executive Summary table:

| Severity | Confirmed | Demoted | Disputed | Rejected |
|----------|-----------|---------|----------|----------|
| Critical | N | N | N | N |
| High | N | N | N | N |
| Medium | N | N | N | N |
| Low | N | N | N | N |

### Step 6: Write Final Report

Write the complete report to `audit-output/CONFIRMED-REPORT.md`.

Group findings by severity: Critical → High → Medium → Low.

Include all sections from the audit report template:
1. Executive Summary (statistics + key risks)
2. Scope & Methodology
3. Confirmed Findings (grouped by severity)
4. Invariant Specifications summary
5. Execution Evidence Summary (PoC + FV results, or "skipped" note)
6. Judging Self-Loop Summary
7. Discovery Cross-Pollination Record
8. Pipeline Execution Record
9. Appendices (Demoted, Disputed, Architecture Notes, Limitations)

---

## Code Citation Verification Protocol

This is the most important quality gate. Every code reference in the final report must be verified:

```
FOR each finding:
  FOR each code citation (file:line references):
    1. Read(file, offset=line-3, limit=10)
    2. IF content matches finding description:
         → Keep citation, generate permalink
    3. ELSE:
         → Grep(pattern=<vulnerable_pattern>, path=file)
         → Update line numbers to actual location
         → Re-verify with Read
    4. IF code no longer exists:
         → Flag finding for manual review
         → Add note: "Code may have been modified since analysis"
```

---

## Output

- `audit-output/CONFIRMED-REPORT.md` — Final publication-quality report
- All code citations verified against the actual codebase
- All GitHub permalinks use the correct commit hash
- Findings grouped by severity in Sherlock submission format

---

## Error Handling

| Error | Recovery |
|-------|----------|
| Finding references non-existent file | Search for the file elsewhere; if truly gone, flag for manual review |
| Line numbers don't match expected code | Grep for the pattern and update line numbers |
| No GitHub repo URL available | Use `file:LNNN` format instead of permalinks |
| PoC file missing | Note "PoC not generated" in the finding |
| Conflicting judge verdicts | Apply severity reconciliation rules; note disagreement |

