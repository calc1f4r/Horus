name: Sync main to master (no reports)

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Remove all except DB and .github
        run: |
          git rm -r --cached .
          git add DB/
          git add Agents.md
          git add README.md
          git add .github/

      - name: Commit changes
        run: |
          git commit -m "Sync DB and .github to master" --allow-empty

      - name: Push to master
        run: |
          git push origin HEAD:master --force
