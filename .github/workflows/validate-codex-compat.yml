name: Validate Codex Runtime Surfaces

on:
  push:
    branches:
      - hunt-cards
    paths:
      - '.claude/**'
      - '.agents/**'
      - '.codex/**'
      - 'scripts/sync_codex_compat.py'
      - 'scripts/validate_codex_compat.py'
      - 'AGENTS.md'
      - 'docs/codex-architecture.md'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate Codex runtime surfaces
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run Codex runtime parity check
        run: python3 scripts/sync_codex_compat.py --check

      - name: Run Codex runtime validator
        run: python3 scripts/validate_codex_compat.py
