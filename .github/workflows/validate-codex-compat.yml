name: Validate Codex Compatibility Mirror

on:
  push:
    branches:
      - hunt-cards
    paths:
      - '.claude/**'
      - 'codex/**'
      - 'scripts/sync_codex_compat.py'
      - 'AGENTS.md'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate codex mirror
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run codex mirror parity check
        run: python3 scripts/sync_codex_compat.py --check

      - name: Run codex compatibility validator
        run: python3 scripts/validate_codex_compat.py
